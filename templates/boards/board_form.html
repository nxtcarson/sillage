{% extends "base.html" %}
{% block page_title %}{% if board %}Edit{% else %}New{% endif %} Board{% endblock %}
{% block content %}
<form method="post" class="max-w-xl space-y-4">
  {% csrf_token %}
  {% for field in form %}
  <div class="mb-4">
    <label for="{{ field.id_for_label }}" class="block text-sm font-medium mb-1">{{ field.label }}</label>
    {{ field }}
    {% if field.errors %}<p class="text-red-500 text-sm mt-1">{{ field.errors.0 }}</p>{% endif %}
  </div>
  {% endfor %}
  <div class="flex gap-2">
    <button type="submit" class="px-4 py-2 bg-brand-600 text-white rounded-lg">Save</button>
    <a href="{% if board %}{% url 'board_detail' board.pk %}{% else %}{% url 'board_list' %}{% endif %}" class="px-4 py-2 border rounded-lg hover:bg-slate-100 dark:hover:bg-slate-700 dark:border-slate-600">Cancel</a>
  </div>
</form>
{% endblock %}
