<tr class="hover:bg-slate-50 dark:hover:bg-slate-700/50">
  <td class="px-4 py-3"><a href="{{ doc.firebase_storage_url }}" target="_blank" class="text-brand-600">{{ doc.name }}</a></td>
  <td class="px-4 py-3">{% if doc.contact %}{{ doc.contact.full_name }}{% else %}-{% endif %}</td>
  <td class="px-4 py-3">{% if doc.policy %}{{ doc.policy.policy_number|default:"-" }}{% else %}-{% endif %}</td>
  <td class="px-4 py-3">{{ doc.uploaded_at|date:"M d, Y" }}</td>
  <td class="px-4 py-3 text-right"><a href="{{ doc.firebase_storage_url }}" target="_blank" class="text-brand-600 text-sm">Download</a></td>
</tr>
