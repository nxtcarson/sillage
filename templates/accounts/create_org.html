{% extends "base.html" %}
{% block page_title %}Create company{% endblock %}
{% block content %}
<div class="max-w-md mx-auto">
  <h2 class="text-xl font-semibold mb-4">Create a new company</h2>
  {% if error %}<p class="text-red-500 text-sm mb-4">{{ error }}</p>{% endif %}
  <form method="post" class="space-y-4">
    {% csrf_token %}
    <div>
      <label for="name" class="block text-sm font-medium mb-1">Company name</label>
      <input type="text" id="name" name="name" required class="w-full px-3 py-2 border rounded-lg" placeholder="Acme Insurance"
        value="{{ request.POST.name|default:'' }}">
    </div>
    <div class="flex gap-2">
      <button type="submit" class="px-4 py-2 bg-brand-600 text-white rounded-lg">Create</button>
      <a href="{% url 'dashboard' %}" class="px-4 py-2 border rounded-lg hover:bg-slate-100 dark:hover:bg-slate-700">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
