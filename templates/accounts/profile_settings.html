{% extends "base.html" %}
{% block page_title %}Profile{% endblock %}
{% block content %}
<div class="max-w-md">
  <h2 class="text-xl font-semibold mb-4">Profile settings</h2>
  <form method="post" class="space-y-4">
    {% csrf_token %}
    <div>
      <label for="name" class="block text-sm font-medium mb-1">Name</label>
      <input type="text" id="name" name="name" value="{{ user_profile.name|default:'' }}" class="w-full px-3 py-2 border rounded-lg dark:bg-slate-700 dark:border-slate-600">
    </div>
    <div>
      <label for="avatar_url" class="block text-sm font-medium mb-1">Avatar URL (optional)</label>
      <input type="url" id="avatar_url" name="avatar_url" value="{{ user_profile.avatar_url|default:'' }}" placeholder="https://..." class="w-full px-3 py-2 border rounded-lg dark:bg-slate-700 dark:border-slate-600">
    </div>
    <p class="text-sm text-slate-500">Email: {{ user_profile.email }} (cannot be changed)</p>
    <button type="submit" class="px-4 py-2 bg-brand-600 text-white rounded-lg">Save</button>
  </form>
</div>
{% endblock %}
