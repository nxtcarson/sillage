{% extends "base.html" %}
{% block page_title %}Company{% endblock %}
{% block content %}
<div class="max-w-md">
  <h2 class="text-xl font-semibold mb-4">Company settings</h2>
  <form method="post" class="space-y-4">
    {% csrf_token %}
    <div>
      <label for="name" class="block text-sm font-medium mb-1">Company name</label>
      <input type="text" id="name" name="name" value="{{ org.name }}" required class="w-full px-3 py-2 border rounded-lg dark:bg-slate-700 dark:border-slate-600">
    </div>
    <button type="submit" class="px-4 py-2 bg-brand-600 text-white rounded-lg">Save</button>
  </form>
</div>
{% endblock %}
