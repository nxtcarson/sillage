{% extends "base.html" %}
{% block page_title %}{% if contact %}Edit{% else %}Add{% endif %} Contact{% endblock %}
{% block content %}
<form method="post" class="max-w-xl space-y-4">
  {% csrf_token %}
  {{ form.as_p }}
  <div class="flex gap-2">
    <button type="submit" class="px-4 py-2 bg-brand-600 text-white rounded-lg hover:bg-brand-700">Save</button>
    <a href="{% if contact %}{% url 'contact_detail' contact.pk %}{% else %}{% url 'contact_list' %}{% endif %}" class="px-4 py-2 border rounded-lg">Cancel</a>
  </div>
</form>
{% endblock %}
