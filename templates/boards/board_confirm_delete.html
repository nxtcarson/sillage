{% extends "base.html" %}
{% block page_title %}Delete Board{% endblock %}
{% block content %}
<div class="max-w-md">
  <p class="mb-4">Are you sure you want to delete "{{ board.name }}"?</p>
  <form method="post">
    {% csrf_token %}
    <button type="submit" class="px-4 py-2 bg-red-600 text-white rounded-lg">Delete</button>
    <a href="{% url 'board_detail' board.pk %}" class="px-4 py-2 border rounded-lg ml-2 hover:bg-slate-100 dark:hover:bg-slate-700 dark:border-slate-600">Cancel</a>
  </form>
</div>
{% endblock %}
