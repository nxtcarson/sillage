{% extends "base.html" %}
{% block page_title %}{% if policy %}Edit{% else %}Add{% endif %} Policy{% endblock %}
{% block content %}
<form method="post" class="max-w-xl space-y-4">
  {% csrf_token %}
  {{ form.as_p }}
  <div class="flex gap-2">
    <button type="submit" class="px-4 py-2 bg-brand-600 text-white rounded-lg">Save</button>
    <a href="{% if policy %}{% url 'policy_detail' policy.pk %}{% else %}{% url 'policy_list' %}{% endif %}" class="px-4 py-2 border rounded-lg">Cancel</a>
  </div>
</form>
{% endblock %}
