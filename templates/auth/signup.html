{% extends "base.html" %}
{% block content %}
<div class="min-h-screen flex items-center justify-center bg-slate-50 dark:bg-slate-900">
  <div class="w-full max-w-md p-8 bg-white dark:bg-slate-800 rounded-xl shadow-lg">
    <h1 class="text-2xl font-bold mb-6">Sign up</h1>
    <div id="auth-container">
      <div class="space-y-4">
        <div>
          <label class="block text-sm font-medium mb-1">Name</label>
          <input type="text" id="name" class="w-full px-3 py-2 border border-slate-300 dark:border-slate-600 rounded-lg bg-white dark:bg-slate-700" placeholder="Your name">
        </div>
        <div>
          <label class="block text-sm font-medium mb-1">Email</label>
          <input type="email" id="email" class="w-full px-3 py-2 border border-slate-300 dark:border-slate-600 rounded-lg bg-white dark:bg-slate-700" placeholder="you@example.com">
        </div>
        <div>
          <label class="block text-sm font-medium mb-1">Password</label>
          <input type="password" id="password" class="w-full px-3 py-2 border border-slate-300 dark:border-slate-600 rounded-lg bg-white dark:bg-slate-700" placeholder="Min 6 characters">
        </div>
        <p id="auth-error" class="text-red-500 text-sm hidden"></p>
        <button type="button" id="btn-signup" class="w-full py-2 px-4 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700">Create account</button>
        <button type="button" id="btn-google" class="w-full py-2 px-4 border border-slate-300 dark:border-slate-600 rounded-lg hover:bg-slate-50 dark:hover:bg-slate-700">Continue with Google</button>
      </div>
    </div>
    <p class="mt-4 text-sm text-slate-500">
      Already have an account? <a href="{% url 'login' %}" class="text-indigo-600 hover:underline">Log in</a>
    </p>
    <a href="{% url 'landing' %}" class="mt-4 inline-block text-slate-500 hover:underline text-sm">Back to home</a>
  </div>
</div>
<script type="module">
  const firebaseConfig = {
    apiKey: "{{ firebase_api_key }}",
    authDomain: "{{ firebase_auth_domain }}",
    projectId: "{{ firebase_project_id }}",
    storageBucket: "{{ firebase_storage_bucket }}",
  };
  const script = document.createElement('script');
  script.src = 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js';
  script.async = true;
  document.head.appendChild(script);
  script.onload = () => {
    const authScript = document.createElement('script');
    authScript.src = 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js';
    authScript.async = true;
    document.head.appendChild(authScript);
    authScript.onload = () => {
      const firebase = window.firebase;
      firebase.initializeApp(firebaseConfig);
      const auth = firebase.auth();
      const errEl = document.getElementById('auth-error');
      const showErr = (msg) => { errEl.textContent = msg; errEl.classList.remove('hidden'); };
      const hideErr = () => { errEl.textContent = ''; errEl.classList.add('hidden'); };
      document.getElementById('btn-signup').onclick = async () => {
        hideErr();
        try {
          const cred = await auth.createUserWithEmailAndPassword(document.getElementById('email').value, document.getElementById('password').value);
          if (cred.user) {
            await cred.user.updateProfile({ displayName: document.getElementById('name').value });
          }
          const token = await cred.user.getIdToken();
          const form = new FormData();
          form.append('id_token', token);
          form.append('csrfmiddlewaretoken', document.querySelector('[name=csrfmiddlewaretoken]').value);
          const r = await fetch('{% url "firebase_login" %}', { method: 'POST', body: form, headers: { 'X-Requested-With': 'XMLHttpRequest' } });
          const data = await r.json();
          if (data.ok) window.location = data.redirect;
          else showErr(data.error || 'Signup failed');
        } catch (e) { showErr(e.message || 'Signup failed'); }
      };
      document.getElementById('btn-google').onclick = async () => {
        hideErr();
        try {
          const provider = new firebase.auth.GoogleAuthProvider();
          const cred = await auth.signInWithPopup(provider);
          const token = await cred.user.getIdToken();
          const form = new FormData();
          form.append('id_token', token);
          form.append('csrfmiddlewaretoken', document.querySelector('[name=csrfmiddlewaretoken]').value);
          const r = await fetch('{% url "firebase_login" %}', { method: 'POST', body: form, headers: { 'X-Requested-With': 'XMLHttpRequest' } });
          const data = await r.json();
          if (data.ok) window.location = data.redirect;
          else showErr(data.error || 'Signup failed');
        } catch (e) { showErr(e.message || 'Signup failed'); }
      };
    };
  };
</script>
{% csrf_token %}
{% endblock %}
